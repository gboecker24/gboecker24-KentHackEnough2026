<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MichaelPiano</title>
    <style>
        body{
            background-color: rgb(215, 209, 202);
        }

        .michael-row {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            margin: 30px 0;
        }

        .michael {
            width: 120px;
            height: auto;
            cursor: pointer;
            transition: transform 0.1s ease, filter 0.1s;
            display: block;
            object-fit: contain;
            border-radius: 20px;
            background: white;
            padding: 12px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        .michael:active {
            transform: scale(0.95);
        }


        a:visited {
            color: #00aaff;
        }

        nav {
            display: flex;
            padding: 20px;
            list-style: none;
            margin-left: 170px;
            margin-right: 170px;
            justify-content: space-evenly;
            background-color: rgb(182, 234, 255);
            border: 4px solid #00aaff;
            font-size: 25px;
        }

        h2{
            text-align: center;
            margin-top: 20px;
            font-size: 35px;
            background-color: rgb(247, 180, 125);
        }

        p{
            text-align: center;
            font-size: 20px;
        }

    </style>
</head>
<body>

<nav>
    <a href="../Caleb.html">Home</a>
    <a href="../Garin.html">Dictionary</a>
    <a href="../Gavin.html">Michael</a>
</nav>

<h2>Michael Piano</h2>
<p>Each Michael is a little unique</p>


<div class="michael-row" id="michaelRow">
</div>

<div style="text-align:center; margin-top:30px;">
    <button id="SpeedDown" style="font-size:24px; padding:10px 20px;">−</button>
    <span id="SpeedDisplay" style="font-size:22px; margin:0 15px;">Speed: 1.00×</span>
    <button id="SpeedUp" style="font-size:24px; padding:10px 20px;">+</button>
</div>

<script>
    const noteFiles = [
        "Notes/G1.wav",
        "Notes/A2.wav",
        "Notes/B3.wav",
        "Notes/C4.wav",
        "Notes/D5.wav",
        "Notes/E6.wav",
        "Notes/F7.wav"
    ];

    function playSound(file) {
        let audio = new Audio(file);
        audio.play();
    }

    const row = document.getElementById("michaelRow");

for (let i = 0; i < 7; i++) {
    let img = document.createElement("img");
    
    const imagePaths = [
        "Photos/G.png",
        "Photos/A.png",
        "Photos/B.png",
        "Photos/C.png",
        "Photos/D.png",
        "Photos/E.png",
        "Photos/F.png"
    ];
    
    img.src = imagePaths[i];
    img.classList.add("michael");
    
    img.addEventListener("click", (function(index) {
        return function() {
            playSound(noteFiles[index]);
        };
    })(i));
    
    row.appendChild(img);
}

let speed = 1.0;

function playSound(file) {
    let audio = new Audio(file);
    audio.playbackRate = speed;
    audio.play();
}

document.getElementById("SpeedUp").addEventListener("click", () => {
    speed = speed + 0.1;
    updatePitchDisplay();
});

document.getElementById("SpeedDown").addEventListener("click", () => {
    speed = Math.max(0.1, speed - 0.1);
    updatePitchDisplay();
});

function updatePitchDisplay() {
    document.getElementById("SpeedDisplay").textContent = `Speed: ${speed.toFixed(2)}×`;
}

</script>

</body>
</html>
