    <h2 style="text-align:center; margin-top: 20px;">
        Make sure you don't touch Michael too much, or he will get angry. He is very sensitive.
    </h2>

    <img id="imageToSwap" src="photos/bigmichael.png" alt="Michael" class="michael">

<script>
    const michael = document.getElementById('imageToSwap');
    let currentWidth = 100;
    let anger = 55;
    let hasSwapped = false;
    
    const angryImage = new Image();
    angryImage.width = 870;
    angryImage.src = "photos/angrybigmichael.png";

    michael.addEventListener('click', function () {

        if (currentWidth < 300) {
            currentWidth += 8;
        }
        else{
            currentWidth = 870;
        }
        if (anger < 130) {
            anger += 3;
        }

        this.style.filter = `saturate(${anger * 2}%)`;
        this.style.width = currentWidth + 'px';

        if (!hasSwapped && currentWidth >= 293) {
            // Set the final width and ensure height is auto before swap
            currentWidth = 870;
            this.style.width = currentWidth + 'px';
            this.style.height = 'auto';
            
            // Swap the image (now the dimensions are already set)
            this.src = angryImage.src;
            hasSwapped = true;
        }
    });
</script>
