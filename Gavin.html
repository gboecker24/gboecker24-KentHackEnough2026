<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michael</title>
    <style>
        .michael{
            width: 100px;
            height:auto;
            transition: width 0.5s ease;
            display: block;
        }
    </style>
</head>
<body>
    <nav>
        <a href="Caleb.html">Home</a>
        <a href="Garin.html">Dihtionary</a>
        <a href="Gavin.html">Michael</a>
    </nav>
    <img src="bigmichael.png" alt="Michael" class="michael">
    <script>
        const michael = document.querySelector('.michael');
        let currentWidth = 100;
        
        michael.addEventListener('click', function() {
            currentWidth = currentWidth + 2;
            this.style.width = currentWidth + 'px';
        });
    </script>
</body>
</html>
